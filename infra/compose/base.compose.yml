# =============================================================================
# Docker Compose - Base Services
# =============================================================================
# Usage (run from infra/compose folder):
#   docker compose -f base.compose.yml -f dev.compose.yml up
#
# With observability:
#   docker compose -f base.compose.yml -f dev.compose.yml -f otel.compose.yml up
#
# Production:
#   docker compose -f base.compose.yml -f prod.compose.yml up
#
# Note: .env file is in this folder (infra/compose/)
# Database: Uses the shared PostgreSQL instance on the devnet network.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Nginx - Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:8322:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - app-network

  # ---------------------------------------------------------------------------
  # API - NestJS Backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-3000}
      - APP_URL=${APP_URL:-http://localhost:8322}
      # Database connection (shared PostgreSQL on devnet)
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-vitalmesh}
      - POSTGRES_SSL=${POSTGRES_SSL:-false}
      # JWT
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TTL_MINUTES=${JWT_ACCESS_TTL_MINUTES:-15}
      - JWT_REFRESH_TTL_DAYS=${JWT_REFRESH_TTL_DAYS:-14}
      # OAuth
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      # AWS
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      # Admin bootstrap
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL}
      # Observability
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-vitalmesh-api}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - app-network
      - devnet

  # ---------------------------------------------------------------------------
  # Web - React Frontend
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    networks:
      - app-network

# =============================================================================
# Networks
# =============================================================================
networks:
  app-network:
    driver: bridge
  devnet:
    external: true
